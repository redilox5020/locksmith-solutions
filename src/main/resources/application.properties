spring.application.name=cerrajeria-api

# Server
server.port=8000
server.servlet.context-path=/API/V1.0

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/cerrajeria
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=autokeys-cerrajeria-secret-key-2024-super-secure-random-string-here
jwt.access-token-expiration=300000
jwt.refresh-token-expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
app.upload.dir=uploads

# Tomcat
server.tomcat.max-swallow-size=-1

# Logging
logging.level.com.todoteg=DEBUG
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
